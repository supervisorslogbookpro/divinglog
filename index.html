<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diving Log — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --abyss:    #070b12;
    --deep:     #0d1520;
    --mid:      #111c2d;
    --surface:  #162236;
    --wire:     #243650;
    --muted:    #3d567a;
    --sub:      #5a7da0;
    --text:     #c8ddf0;
    --bright:   #e8f4ff;
    --cyan:     #00d4ff;
    --cyan-dim: #0099bb;
    --red:      #ef4444;
    --green:    #10b981;
    --amber:    #f59e0b;
    --radius:   8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--abyss);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,100,160,0.2) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 90%, rgba(0,60,100,0.12) 0%, transparent 60%);
  }

  .card {
    background: var(--deep);
    border: 1px solid var(--wire);
    border-radius: 16px;
    padding: 48px 40px;
    width: min(420px, 92vw);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.7;
  }

  .brand {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 36px;
  }
  .brand-icon {
    width: 36px; height: 36px;
    border: 1.5px solid var(--cyan);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--cyan);
    box-shadow: 0 0 14px rgba(0,212,255,0.2);
    flex-shrink: 0;
  }
  .brand-text h1 {
    font-family: 'Syne', sans-serif;
    font-size: 17px; font-weight: 800;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--bright);
    line-height: 1;
  }
  .brand-text p {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.06em; margin-top: 4px;
  }

  /* tabs */
  .tabs {
    display: flex;
    background: var(--mid);
    border: 1px solid var(--wire);
    border-radius: var(--radius);
    padding: 3px; gap: 3px;
    margin-bottom: 28px;
  }
  .tab {
    flex: 1; text-align: center;
    padding: 8px;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; border: none;
    color: var(--muted); background: none;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--surface);
    color: var(--bright);
    border: 1px solid var(--wire);
  }

  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--sub); margin-bottom: 7px;
  }
  input[type="email"],
  input[type="password"] {
    width: 100%;
    background: var(--mid);
    border: 1px solid var(--wire);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  input:focus {
    border-color: var(--cyan-dim);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
  }

  .btn-primary {
    width: 100%;
    background: var(--cyan);
    color: var(--abyss);
    border: none;
    padding: 12px;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,212,255,0.2);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary:hover {
    background: #33ddff;
    box-shadow: 0 0 30px rgba(0,212,255,0.35);
    transform: translateY(-1px);
  }
  .btn-primary:disabled {
    opacity: 0.5; cursor: not-allowed; transform: none;
  }

  .msg {
    margin-top: 16px;
    font-size: 12px;
    text-align: center;
    min-height: 18px;
    transition: all 0.2s;
  }
  .msg.error   { color: var(--red); }
  .msg.success { color: var(--green); }
  .msg.info    { color: var(--amber); }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(7,11,18,0.4);
    border-top-color: var(--abyss);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .divider {
    height: 1px; background: var(--wire);
    margin: 24px 0;
  }
  .footer-note {
    text-align: center;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 8v4l3 3"/>
        <path d="M7 3.34A9 9 0 0 1 21 12"/>
      </svg>
    </div>
    <div class="brand-text">
      <h1>Diving Log</h1>
      <p>Commercial Diving Supervision</p>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" id="tab-login"  onclick="switchTab('login')">Sign In</button>
    <button class="tab"        id="tab-signup" onclick="switchTab('signup')">Create Account</button>
  </div>

  <!-- FORM -->
  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="supervisor@company.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-primary" id="btn-submit" onclick="handleSubmit()">
    <span id="btn-label">Sign In</span>
  </button>

  <div class="msg" id="msg"></div>

  <div class="divider"></div>
  <div class="footer-note">Secure · Powered by Supabase</div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://jqbtjklxbfydmwwztbvn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_KT7j111OChA9tnNq2gqkAQ_Vp7TfGkG';

// GitHub Pages path — adjust if repo name changes
const APP_URL = '/diving-log-saas/app.html';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let mode = 'login'; // 'login' | 'signup'

// ── REDIRECT IF ALREADY LOGGED IN ─────────────────────────────────────────
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = APP_URL;
});

// ── AUTH STATE CHANGE (catches OAuth, email confirm, etc.) ─────────────────
sb.auth.onAuthStateChange((event, session) => {
  if (session) window.location.href = APP_URL;
});

// ── TAB SWITCH ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  mode = tab;
  document.getElementById('tab-login').classList.toggle('active',  tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('btn-label').textContent = tab === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('password').autocomplete = tab === 'login' ? 'current-password' : 'new-password';
  clearMsg();
}

// ── SUBMIT ─────────────────────────────────────────────────────────────────
async function handleSubmit() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) { showMsg('Please fill in all fields.', 'error'); return; }
  if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }

  setLoading(true);

  if (mode === 'login') {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { showMsg(error.message, 'error'); setLoading(false); }
    // on success → onAuthStateChange fires → redirect

  } else {
    const { error } = await sb.auth.signUp({ email, password });
    setLoading(false);
    if (error) {
      showMsg(error.message, 'error');
    } else {
      showMsg('Account created! Check your email to confirm, then sign in.', 'success');
      switchTab('login');
    }
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSubmit();
});

// ── HELPERS ────────────────────────────────────────────────────────────────
function setLoading(on) {
  const btn = document.getElementById('btn-submit');
  const lbl = document.getElementById('btn-label');
  btn.disabled = on;
  lbl.innerHTML = on
    ? '<span class="spinner"></span>'
    : (mode === 'login' ? 'Sign In' : 'Create Account');
}

function showMsg(text, type='info') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = `msg ${type}`;
}

function clearMsg() {
  const el = document.getElementById('msg');
  el.textContent = '';
  el.className = 'msg';
}
</script>
</body>
</html>
