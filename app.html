<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#060E1A">
<meta name="apple-mobile-web-app-title" content="Logbook Pro">
<meta name="description" content="Commercial Diving Supervision Logbook">
<link rel="manifest" href="manifest.json">
<title>Supervisor Logbook Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:   #060E1A;
  --bg2:  #0A1929;
  --bg3:  #0D2040;
  --bd:   #152E44;
  --bd2:  #1C3A54;
  --tx:   #D4E8F5;
  --mu:   #3A6080;
  --lb:   #5B8DB8;
  --bell: #2196F3;
  --bellD:#1565C0;
  --surf: #3DDC84;
  --surfD:#1B5E20;
  --gold: #F4A636;
  --goldD:#C47E10;
  --goldL:#FFD080;
  --red:  #E74C3C;
  --r:    9px;
}

*{box-sizing:border-box;margin:0;padding:0;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100%;background:var(--bg);color:var(--tx);
  font-family:'Inter',system-ui,sans-serif;font-size:14px;
  overscroll-behavior:none;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;max-width:700px;margin:0 auto;}

/* ══ HEADER ══════════════════════════ */
header{
  background:linear-gradient(160deg,#070F1E,#0C2038);
  border-bottom:2px solid var(--goldD);
  flex-shrink:0;padding:10px 14px 0;
  position:relative;overflow:hidden;
}
/* subtle wave */
header::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5;}

.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.hdr-brand{display:flex;align-items:center;gap:10px;}

/* DSV flag icon in header */
.hdr-flag{width:36px;height:36px;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(244,166,54,.4));}

.hdr-titles{display:flex;flex-direction:column;gap:1px;}
.hdr-sup{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);opacity:.8;}
.hdr-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;
  color:var(--tx);letter-spacing:-.01em;line-height:1;}

.hdr-right{display:flex;align-items:center;gap:7px;}
.sync-pill{background:var(--bg2);border:1px solid var(--bd);border-radius:20px;
  padding:4px 10px;font-size:10px;font-weight:700;color:var(--lb);
  display:flex;align-items:center;gap:5px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--surf);flex-shrink:0;
  box-shadow:0 0 5px var(--surf);}
.unit-toggle{display:flex;background:var(--bg2);border:1px solid var(--bd);
  border-radius:20px;padding:3px;gap:2px;}
.unit-btn{background:none;border:none;color:var(--mu);font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:14px;cursor:pointer;transition:all .15s;
  font-family:'Inter',sans-serif;letter-spacing:.04em;}
.unit-btn.on{background:var(--gold);color:var(--bg);box-shadow:0 0 8px rgba(244,166,54,.4);}
.btn-out{background:none;border:1px solid var(--bd);color:var(--mu);font-size:10px;
  font-weight:600;padding:5px 10px;border-radius:20px;cursor:pointer;transition:all .15s;}
.btn-out:hover{border-color:var(--red);color:var(--red);}
.btn-install{display:none;background:rgba(244,166,54,.1);border:1px solid var(--goldD);
  color:var(--gold);font-size:10px;font-weight:600;padding:5px 10px;border-radius:20px;
  cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;
  align-items:center;gap:4px;}
.btn-install.visible{display:flex;}
.btn-install:hover{background:rgba(244,166,54,.18);border-color:var(--gold);}

/* ══ TABS ════════════════════════════ */
nav{display:flex;padding:0 2px;}
.ntab{flex:1;padding:7px 2px 8px;text-align:center;font-size:8px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;cursor:pointer;
  border-top:2.5px solid transparent;color:var(--mu);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:color .15s,border-color .15s;user-select:none;}
.ntab .ni{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
.ntab.a-new  {color:var(--gold); border-top-color:var(--gold);}
.ntab.a-bell {color:var(--bell); border-top-color:var(--bell);}
.ntab.a-surf {color:var(--surf); border-top-color:var(--surf);}
.ntab.a-all  {color:var(--lb);   border-top-color:var(--lb);}
.ntab.a-stats{color:#B07FE8;    border-top-color:#B07FE8;}

/* ══ MAIN ════════════════════════════ */
main{flex:1;overflow-y:auto;overscroll-behavior:contain;}
.tab{display:none;padding:12px 12px 100px;}
.tab.on{display:block;}

/* ══ SECTION HEADERS ════════════════ */
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:4px 0;}
.sec-hdr svg{flex-shrink:0;opacity:.85;}
.sec-hdr-txt{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;color:var(--gold);}
.sec-hdr-line{flex:1;height:1px;background:linear-gradient(to right,var(--goldD),transparent);opacity:.4;}

/* ══ CARDS ═══════════════════════════ */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  padding:14px;margin-bottom:10px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--goldD),transparent);opacity:.5;}
.clabel{display:flex;align-items:center;gap:7px;
  font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--gold);
  text-transform:uppercase;margin-bottom:12px;}
.clabel svg{opacity:.8;}

/* ══ FIELDS ══════════════════════════ */
.field{margin-bottom:10px;}
.flabel{display:flex;align-items:center;gap:5px;
  font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--gold);
  text-transform:uppercase;margin-bottom:4px;opacity:.9;}
.flabel svg{width:11px;height:11px;opacity:.7;flex-shrink:0;}
.req{color:var(--red);}

input[type=text],input[type=number],input[type=date],textarea{
  width:100%;background:var(--bg);border:1.5px solid var(--bd);border-radius:8px;
  padding:11px 12px;color:var(--tx);font-size:14px;font-family:'Inter',sans-serif;
  outline:none;-webkit-appearance:none;transition:border-color .15s;color-scheme:dark;}
input:focus,textarea:focus{border-color:var(--gold);}
textarea{resize:vertical;min-height:70px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.depth-hint{font-size:10px;color:var(--mu);margin-top:4px;min-height:13px;transition:color .2s;}
.depth-hint.live{color:var(--gold);opacity:.7;}

/* ══ DIVE TYPE BUTTONS ══════════════ */
.tipo-row{display:flex;gap:8px;margin-bottom:12px;}
.tipo-btn{flex:1;padding:14px 8px;border-radius:8px;border:2px solid var(--bd);
  background:var(--bg);color:var(--mu);font-size:12px;font-weight:700;
  cursor:pointer;text-align:center;font-family:'Inter',sans-serif;
  transition:all .15s;user-select:none;
  display:flex;flex-direction:column;align-items:center;gap:8px;}
.tipo-btn svg{width:32px;height:32px;opacity:.35;transition:opacity .15s;}
.tipo-btn.bell-on{border-color:var(--bell);background:#1565C018;color:var(--bell);}
.tipo-btn.bell-on svg{opacity:1;}
.tipo-btn.surf-on{border-color:var(--surf);background:#3DDC8418;color:var(--surf);}
.tipo-btn.surf-on svg{opacity:1;}

/* ══ COMBOBOX ════════════════════════ */
.combo-wrap{position:relative;}
.combo-row{display:flex;}
.combo-inp{flex:1;border-radius:8px 0 0 8px !important;}
.combo-arr{background:var(--bg);border:1.5px solid var(--bd);border-left:none;
  border-radius:0 8px 8px 0;color:var(--mu);cursor:pointer;
  padding:0 12px;display:flex;align-items:center;transition:color .15s;flex-shrink:0;}
.combo-arr:hover{color:var(--gold);}
.combo-arr svg{width:11px;height:11px;pointer-events:none;}
.combo-dd{position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--bg2);border:1.5px solid var(--goldD);border-radius:8px;
  z-index:500;max-height:200px;overflow-y:auto;display:none;
  box-shadow:0 16px 48px rgba(0,0,0,.8);}
.combo-dd.open{display:block;}
.combo-opt{padding:11px 14px;cursor:pointer;font-size:13px;color:var(--lb);
  border-bottom:1px solid var(--bg);transition:background .12s;}
.combo-opt:last-child{border-bottom:none;}
.combo-opt:hover{background:var(--bg3);color:var(--tx);}
.combo-add{color:var(--gold);}
.combo-add::before{content:'+ ';font-weight:700;}

/* ══ FORM ACTIONS ═══════════════════ */
.form-actions{
  display:flex;flex-direction:column;gap:8px;
  margin-top:10px;max-width:320px; /* left-aligned */
}
.btn-save{width:100%;padding:14px 20px;border-radius:9px;border:none;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;
  background:linear-gradient(135deg,var(--bellD),var(--bell));
  color:#fff;box-shadow:0 4px 20px rgba(33,150,243,.35);
  display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-save.surf-mode{background:linear-gradient(135deg,var(--surfD),var(--surf));
  box-shadow:0 4px 20px rgba(61,220,132,.25);}
.btn-save:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;}
.btn-repeat{width:100%;padding:11px 20px;border-radius:9px;
  background:var(--bg3);border:1px solid var(--goldD);color:var(--gold);
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-repeat:hover{background:rgba(244,166,54,.08);border-color:var(--gold);}
.btn-repeat svg{width:14px;height:14px;}
.form-msg{font-size:11px;margin-top:6px;min-height:14px;}
.form-msg.ok{color:var(--surf);}
.form-msg.err{color:var(--red);}

/* ══ LOG / ACCORDION ════════════════ */
.month-grp{margin-bottom:8px;}
.month-hdr{display:flex;align-items:center;justify-content:space-between;
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  padding:11px 14px;cursor:pointer;user-select:none;transition:border-color .15s;}
.month-hdr:hover,.month-hdr.open{border-color:var(--goldD);}
.month-hdr.open{border-radius:var(--r) var(--r) 0 0;}
.month-hdr-left{display:flex;align-items:center;gap:8px;}
.month-lbl{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  color:var(--tx);letter-spacing:.02em;}
.month-meta{font-size:10px;color:var(--mu);display:flex;gap:10px;align-items:center;}
.depth-badge{background:rgba(244,166,54,.08);border:1px solid rgba(244,166,54,.2);
  border-radius:4px;padding:2px 8px;color:var(--gold);font-size:9px;}
.month-chev{color:var(--mu);transition:transform .2s;width:15px;height:15px;flex-shrink:0;}
.month-hdr.open .month-chev{transform:rotate(180deg);}
.month-body{display:none;border:1px solid var(--goldD);border-top:none;
  border-radius:0 0 var(--r) var(--r);overflow:hidden;}
.month-body.open{display:block;}

.dive-hdr-row,.dive-row{
  display:grid;grid-template-columns:80px 100px 1fr 78px 46px;
  align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bg);}
.dive-row:last-child{border-bottom:none;}
.dive-hdr-row{background:var(--bg3);padding:6px 14px;border-bottom:1px solid var(--bd);}
.dive-row{transition:background .1s;}
.dive-row:hover{background:rgba(244,166,54,.03);}
.col-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);opacity:.6;}
.dive-date{font-size:11px;color:var(--lb);font-weight:500;}
.type-tag{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:3px 8px;border-radius:5px;display:inline-block;}
.tag-bell{background:rgba(33,150,243,.14);color:var(--bell);border:1px solid rgba(33,150,243,.2);}
.tag-surf{background:rgba(61,220,132,.1);color:var(--surf);border:1px solid rgba(61,220,132,.2);}
.tag-other{background:rgba(91,141,184,.08);color:var(--lb);border:1px solid var(--bd);}
.d-depth-main{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--tx);}
.d-depth-alt{font-size:9px;color:var(--mu);}
.d-job{font-size:12px;color:var(--lb);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dive-actions{display:flex;gap:3px;justify-content:flex-end;}
.btn-ic{background:none;border:none;color:var(--mu);cursor:pointer;
  padding:5px;border-radius:5px;display:flex;align-items:center;transition:color .13s;}
.btn-ic.edit:hover{color:var(--gold);}
.btn-ic.del:hover{color:var(--red);}
.btn-ic svg{width:14px;height:14px;}

.empty{text-align:center;padding:52px 20px;color:var(--mu);}
.empty svg{width:52px;height:52px;margin:0 auto 14px;display:block;opacity:.2;}
.empty p{font-size:12px;line-height:1.7;}

/* ══ STATS ═══════════════════════════ */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  padding:16px 14px;text-align:center;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:currentColor;opacity:.2;border-radius:var(--r) var(--r) 0 0;}
.stat-val{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;line-height:1;color:var(--tx);}
.stat-unit{font-size:13px;color:var(--mu);margin-left:2px;font-weight:400;}
.stat-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);margin-top:5px;opacity:.8;}
.gauge-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  padding:14px 12px;text-align:center;position:relative;overflow:hidden;}
.gauge-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:currentColor;opacity:.2;border-radius:var(--r) var(--r) 0 0;}
.gauge-wrap{position:relative;width:78px;height:78px;margin:0 auto 6px;}
.gauge-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
.depth-bar-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  padding:16px;margin-bottom:12px;}
.depth-row{margin-bottom:10px;}
.depth-row:last-child{margin-bottom:0;}
.depth-row-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.depth-row-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);opacity:.7;}
.depth-row-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1;}
.depth-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.depth-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.lb-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  padding:14px;margin-bottom:10px;}
.lb-title{display:flex;align-items:center;gap:7px;margin-bottom:10px;
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);}
.lb-rows{display:flex;flex-direction:column;gap:5px;}
.lb-row{display:flex;align-items:center;justify-content:space-between;
  background:var(--bg3);border:1px solid var(--bd);border-radius:7px;
  padding:9px 13px;position:relative;overflow:hidden;}
.lb-bar{position:absolute;left:0;top:0;bottom:0;
  background:rgba(244,166,54,.06);transition:width .4s ease;}
.lb-name{font-size:13px;color:var(--tx);font-weight:500;position:relative;z-index:1;}
.lb-count{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;
  color:var(--gold);position:relative;z-index:1;}

/* ══ MODAL ═══════════════════════════ */
.overlay{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.8);backdrop-filter:blur(4px);
  z-index:1000;align-items:center;justify-content:center;padding:14px;}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--goldD);border-radius:12px;
  width:min(660px,100%);max-height:92vh;overflow-y:auto;padding:22px;position:relative;
  box-shadow:0 24px 80px rgba(0,0,0,.8),0 0 20px rgba(244,166,54,.06);}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--goldD),var(--gold),transparent);
  opacity:.7;border-radius:12px 12px 0 0;}
.modal-hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--gold);}
.modal-close{margin-left:auto;background:none;border:none;color:var(--mu);
  font-size:20px;cursor:pointer;padding:4px 8px;border-radius:5px;transition:color .13s;}
.modal-close:hover{color:var(--red);}
.modal-actions{display:flex;gap:10px;margin-top:16px;max-width:320px;}
.btn-update{flex:1;background:linear-gradient(135deg,var(--bellD),var(--bell));
  color:#fff;border:none;padding:12px;border-radius:9px;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;box-shadow:0 4px 18px rgba(33,150,243,.3);transition:all .15s;}
.btn-update:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}
.btn-cancel{background:var(--bg3);border:1px solid var(--goldD);color:var(--gold);
  padding:12px 20px;border-radius:9px;font-family:'Inter',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-cancel:hover{border-color:var(--gold);}

/* ══ TOAST ═══════════════════════════ */
#toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-70px);
  background:var(--bg3);border:1px solid var(--goldD);color:var(--gold);
  padding:10px 22px;border-radius:24px;font-size:13px;font-weight:700;
  z-index:99999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.err{border-color:var(--red);color:var(--red);}

.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:rot .65s linear infinite;vertical-align:middle;}
@keyframes rot{to{transform:rotate(360deg)}}

/* ══ RESPONSIVE ══════════════════════ */
@media(min-width:580px){
  .stat-grid{grid-template-columns:repeat(4,1fr);}
  .dive-hdr-row,.dive-row{grid-template-columns:88px 110px 1fr 88px 50px;}
  .form-actions{flex-direction:row;max-width:100%;}
  .btn-save{flex:2;}.btn-repeat{flex:1;}
}
@media(max-width:420px){
  .dive-hdr-row,.dive-row{grid-template-columns:68px 1fr 60px 40px;}
  .dive-hdr-row .col-lbl:nth-child(3),.dive-row .d-job{display:none;}
}
</style>
</head>
<body>
<div id="app">

<!-- ══════ HEADER ══════ -->
<header>
  <div class="hdr-top">
    <div class="hdr-brand">
      <!-- DSV Alpha flag (diver below / blue-white) -->
      <svg class="hdr-flag" viewBox="0 0 36 36" fill="none">
        <!-- flag pole -->
        <line x1="6" y1="4" x2="6" y2="32" stroke="#8AAABB" stroke-width="1.5" stroke-linecap="round"/>
        <!-- DSV Alpha flag: white top, blue cut -->
        <path d="M6 6 L28 6 L28 14 L20 20 L6 20 Z" fill="white" opacity=".95"/>
        <path d="M6 13 L28 13 L20 20 L6 20 Z" fill="#1565C0" opacity=".95"/>
        <!-- notch (alpha flag shape) -->
        <path d="M28 6 L36 13 L28 20" fill="#060E1A" stroke="none"/>
        <!-- hoist rope -->
        <line x1="6" y1="6" x2="6" y2="20" stroke="#C0A060" stroke-width=".8"/>
        <!-- glow -->
        <circle cx="6" cy="6" r="2" fill="#F4A636" opacity=".5"/>
      </svg>
      <div class="hdr-titles">
        <span class="hdr-sup">Commercial Diving</span>
        <span class="hdr-name">Supervisor Logbook Pro</span>
      </div>
    </div>
    <div class="hdr-right">
      <div class="sync-pill">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-txt">Online</span>
      </div>

const {createClient}=supabase;
const sb=createClient(SUPA_URL,SUPA_KEY);

let user=null,allDives=[],lastDive=null,editingId=null;
let unitSys='metric',diveType='',editType='';
let ddData={divers:[],job:[],client:[],vessel:[],country:[]};

// UNITS
const M2FT=3.28084,FT2M=1/3.28084;
const toDisplay=m=>m==null?null:unitSys==='imperial'?Math.round(m*M2FT):m;
const toMeters=v=>{if(v==null||v==='')return null;const n=parseFloat(v);return isNaN(n)?null:unitSys==='imperial'?Math.round(n*FT2M*10)/10:n;};
const uLbl=()=>unitSys==='imperial'?'ft':'m';
const uAlt=()=>unitSys==='imperial'?'m':'ft';
const toAlt=m=>m==null?null:unitSys==='imperial'?m:Math.round(m*M2FT);

function setUnit(u){
  unitSys=u;
  document.getElementById('btn-m').classList.toggle('on',u==='metric');
  document.getElementById('btn-ft').classList.toggle('on',u==='imperial');
  // update depth labels
  const dl=document.getElementById('lbl-depth');
  if(dl){const txt=dl.childNodes[dl.childNodes.length-1];if(txt.nodeType===3)txt.textContent=` Depth (${uLbl()})`;}
  // simpler: just set innerHTML preserving the icon
  document.getElementById('lbl-depth').innerHTML=document.getElementById('lbl-depth').innerHTML.replace(/Depth \([^)]+\)/,`Depth (${uLbl()})`);
  const el=document.getElementById('e-lbl-depth');if(el)el.textContent=`Depth (${uLbl()})`;
  sb.from('profiles').update({unit_system:u}).eq('id',user.id).then(()=>{});
  renderAllLogs();if(activeTab==='stats')renderStats();
  showToast(u==='metric'?'Metric (m)':'Imperial (ft)');
}
function updateHint(iid,hid){
  const v=parseFloat(document.getElementById(iid)?.value);
  const h=document.getElementById(hid);if(!h)return;
  if(isNaN(v)||!document.getElementById(iid).value){h.textContent='';h.className='depth-hint';return;}
  h.textContent=unitSys==='imperial'?`≈ ${Math.round(v*FT2M*10)/10} m`:`≈ ${Math.round(v*M2FT)} ft`;
  h.className='depth-hint live';
}

// AUTH
async function boot(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href=APP_ROOT+'index.html';return;}
  user=session.user;
  document.getElementById('sync-txt').textContent=user.email.split('@')[0].slice(0,12);
  const{data:prof}=await sb.from('profiles').select('unit_system').eq('id',user.id).single();
  if(prof?.unit_system){
    unitSys=prof.unit_system;
    document.getElementById('btn-m').classList.toggle('on',unitSys==='metric');
    document.getElementById('btn-ft').classList.toggle('on',unitSys==='imperial');
    document.getElementById('lbl-depth').innerHTML=
      document.getElementById('lbl-depth').innerHTML.replace(/Depth \([^)]+\)/,`Depth (${uLbl()})`);
  }
  await loadDropdowns();buildAllCombos();await loadDives();setToday();
  window.addEventListener('offline',()=>{
    const d=document.getElementById('sync-dot');
    d.style.background='var(--red)';d.style.boxShadow='0 0 5px var(--red)';
    document.getElementById('sync-txt').textContent='Offline';
  });
  window.addEventListener('online',()=>{
    const d=document.getElementById('sync-dot');d.style.background='';d.style.boxShadow='';
    document.getElementById('sync-txt').textContent=user.email.split('@')[0].slice(0,12);
  });
}
document.getElementById('btn-out').addEventListener('click',async()=>{
  await sb.auth.signOut();window.location.href=APP_ROOT+'index.html';
});

// TABS
const TABS={

function goTab(t){

function pickType(t){

  document.getElementById('tb-surf').className='tipo-btn'+(t==='Surface Supply'?' surf-on':'');

// DROPDOWNS
async function loadDropdowns(){
  const{data}=await sb.from('dropdown_options').select('*').eq('user_id',user.id);
  ddData={divers:[],job:[],client:[],vessel:[],country:[]};
  (data||[]).forEach(r=>{if(ddData[r.field_name]!==undefined)ddData[r.field_name].push(r.value);});
}
async function saveDD(key,val){
  if(!val?.trim()||ddData[key].includes(val.trim()))return;
  ddData[key].push(val.trim());
  await sb.from('dropdown_options').insert({user_id:user.id,field_name:key,value:val.trim()});
}

// COMBOBOX
const CW_MAIN=[
  {w:'cw-divers', k:'divers', p:'Search or add diver…',  f:'f-divers'},
  {w:'cw-job',    k:'job',    p:'Search or add job…',     f:'f-job'},
  {w:'cw-client', k:'client', p:'Search or add client…',  f:'f-client'},
  {w:'cw-vessel', k:'vessel', p:'Search or add vessel…',  f:'f-vessel'},
  {w:'cw-country',k:'country',p:'Search or add country…', f:'f-country'},
];
const CW_EDIT=[
  {w:'ecw-divers', k:'divers', p:'Divers…',  f:'e-divers'},
  {w:'ecw-job',    k:'job',    p:'Job…',      f:'e-job'},
  {w:'ecw-client', k:'client', p:'Client…',   f:'e-client'},
  {w:'ecw-vessel', k:'vessel', p:'Vessel…',   f:'e-vessel'},
  {w:'ecw-country',k:'country',p:'Country…',  f:'e-country'},
];
function buildAllCombos(){[...CW_MAIN,...CW_EDIT].forEach(c=>buildCombo(c.w,c.k,c.p,c.f));}
function buildCombo(wrapId,key,ph,fid){
  const wrap=document.getElementById(wrapId);if(!wrap)return;
  wrap.innerHTML=`
    <div class="combo-row">
      <input type="text" class="combo-inp" id="${fid}" placeholder="${ph}" autocomplete="off">
      <button type="button" class="combo-arr" tabindex="-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
    <div class="combo-dd" id="${fid}-dd"></div>`;
  const inp=document.getElementById(fid),dd=document.getElementById(fid+'-dd');
  const arr=wrap.querySelector('.combo-arr');
  function open(q=''){
    const opts=ddData[key].filter(v=>v.toLowerCase().includes(q.toLowerCase()));
    dd.innerHTML='';
    opts.forEach(v=>{
      const el=document.createElement('div');el.className='combo-opt';el.textContent=v;
      el.addEventListener('mousedown',e=>{e.preventDefault();inp.value=v;dd.classList.remove('open');});
      dd.appendChild(el);
    });
    if(q.trim()&&!ddData[key].map(v=>v.toLowerCase()).includes(q.trim().toLowerCase())){
      const add=document.createElement('div');add.className='combo-opt combo-add';
      add.textContent=`Add "${q.trim()}"`;
      add.addEventListener('mousedown',async e=>{
        e.preventDefault();await saveDD(key,q.trim());inp.value=q.trim();dd.classList.remove('open');
      });
      dd.appendChild(add);
    }
    dd.classList.toggle('open',dd.children.length>0);
  }
  inp.addEventListener('focus',()=>open(inp.value));
  inp.addEventListener('input',()=>open(inp.value));
  inp.addEventListener('blur',()=>setTimeout(()=>dd.classList.remove('open'),200));
  arr.addEventListener('mousedown',e=>{
    e.preventDefault();
    if(dd.classList.contains('open')){dd.classList.remove('open');return;}
    open(inp.value);inp.focus();
  });
}

// FORM
function setToday(){const el=document.getElementById('f-date');if(el&&!el.value)el.value=new Date().toISOString().split('T')[0];}
const gv=id=>document.getElementById(id)?.value||'';
const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v??'';};
function readForm(pfx='f'){
  return{date:gv(`${pfx}-date`),dive_type:pfx==='f'?diveType:editType,
    depth:toMeters(gv(`${pfx}-depth`)),depth_unit:unitSys,
    divers:gv(`${pfx}-divers`),deco:gv(`${pfx}-deco`),tdt:gv(`${pfx}-tdt`),
    job:gv(`${pfx}-job`),client:gv(`${pfx}-client`),vessel:gv(`${pfx}-vessel`),
    location:gv(`${pfx}-location`),country:gv(`${pfx}-country`),notes:gv(`${pfx}-notes`)};
}
function fillForm(d,pfx='f'){
  sv(`${pfx}-date`,d.date);sv(`${pfx}-depth`,d.depth!=null?toDisplay(d.depth):'');
  ['divers','deco','tdt','job','client','vessel','location','country','notes'].forEach(k=>sv(`${pfx}-${k}`,d[k]));
  updateHint(`${pfx}-depth`,pfx==='f'?'hint-depth':'e-hint-depth');
  if(pfx==='f')pickType(d.dive_type||'');else pickEditType(d.dive_type||'');
}
function clearForm(){
  ['date','depth','divers','deco','tdt','job','client','vessel','location','country','notes'].forEach(id=>sv(`f-${id}`,''));
  pickType('');setToday();
  document.getElementById('hint-depth').textContent='';
  document.getElementById('form-msg').textContent='';
  document.getElementById('form-msg').className='form-msg';
}
async function saveAllDD(d){await Promise.all(['divers','job','client','vessel','country'].map(k=>saveDD(k,d[k])));}

// SAVE
async function saveDive(){
  const p=readForm('f');
  if(!p.date){showFMsg('Date is required.','err');return;}
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Saving…';
  await saveAllDD(p);
  const{data,error}=await sb.from('dives').insert({user_id:user.id,...p}).select().single();
  btn.disabled=false;
  btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15"><path d="M12 2v14M7 9l5 7 5-7"/><path d="M3 19h18"/></svg> Save Dive';
  if(error){showFMsg(error.message,'err');return;}
  lastDive={...p};allDives.unshift(data);
  renderAllLogs();clearForm();showToast('Dive saved ✓');
  showFMsg('Record saved!','ok');setTimeout(()=>{document.getElementById('form-msg').textContent='';},3000);
}
function showFMsg(txt,cls){const el=document.getElementById('form-msg');el.textContent=txt;el.className=`form-msg ${cls}`;}

// REPEAT
function repeatLast(){
  const src=lastDive||allDives[0];
  if(!src){showToast('No previous dive found','err');return;}
  fillForm({...src,date:new Date().toISOString().split('T')[0]},'f');
  showToast('Last dive loaded — review & save');
}

// LOAD
async function loadDives(){
  const{data,error}=await sb.from('dives').select('*').eq('user_id',user.id).order('date',{ascending:false});
  if(error){console.error(error);return;}
  allDives=data||[];if(allDives.length)lastDive=allDives[0];renderAllLogs();
}

// RENDER LOGS
function renderAllLogs(){
  renderLog('log-bell',allDives.filter(d=>d.dive_type==='Bell/Sat'));
  renderLog('log-surf',allDives.filter(d=>d.dive_type==='Surface Supply'));
  renderLog('log-all',allDives);
}
function renderLog(cid,dives){
  const el=document.getElementById(cid);if(!el)return;
  if(!dives.length){
    el.innerHTML=`<div class="empty">
      <svg viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 24 C12 16 36 16 36 24 L36 32 L12 32 Z" stroke="currentColor" stroke-width="1.5"/>
        <ellipse cx="24" cy="21" rx="7" ry="5" stroke="currentColor" stroke-width="1.2"/>
        <line x1="24" y1="32" x2="24" y2="38" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 2"/>
        <line x1="20" y1="40" x2="28" y2="40" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <p>No dives logged here yet.<br>Go to <strong>New</strong> to add the first entry.</p>
    </div>`;return;
  }
  const groups={};
  dives.forEach(d=>{const k=d.date?d.date.slice(0,7):'unknown';if(!groups[k])groups[k]=[];groups[k].push(d);});
  const MON=['January','February','March','April','May','June','July','August','September','October','November','December'];
  let html='';let first=true;
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(ym=>{
    const ds=groups[ym];const[yr,mo]=ym.split('-');
    const lbl=`${MON[parseInt(mo)-1]} ${yr}`;
    const maxD=Math.max(...ds.map(d=>d.depth||0));
    const maxStr=maxD?`↓ ${toDisplay(maxD)}${uLbl()} / ${toAlt(maxD)}${uAlt()}`:'';
    const isOpen=first;first=false;
    html+=`
      <div class="month-grp">
        <div class="month-hdr ${isOpen?'open':''}" onclick="toggleMonth(this)">
          <div class="month-hdr-left">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" opacity=".7">
              <circle cx="12" cy="5" r="2"/><line x1="12" y1="7" x2="12" y2="20"/>
              <path d="M6 13l6 7 6-7"/><line x1="6" y1="9" x2="18" y2="9"/>
            </svg>
            <span class="month-lbl">${lbl}</span>
          </div>
          <span class="month-meta">
            <span>${ds.length} dive${ds.length!==1?'s':''}</span>
            ${maxStr?`<span class="depth-badge">${maxStr}</span>`:''}
          </span>
          <svg class="month-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <div class="month-body ${isOpen?'open':''}">
          <div class="dive-hdr-row">
            <span class="col-lbl">Date</span>
            <span class="col-lbl">Type</span>
            <span class="col-lbl">Job / Location</span>
            <span class="col-lbl">Depth</span>
            <span class="col-lbl"></span>
          </div>
          ${ds.map(d=>diveRow(d)).join('')}
        </div>
      </div>`;
  });
  el.innerHTML=html;
  el.querySelectorAll('.btn-edit').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();openEdit(b.dataset.id);}));
  el.querySelectorAll('.btn-del').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();delDive(b.dataset.id);}));
}
function diveRow(d){
  const tc=d.dive_type==='Bell/Sat'?'tag-bell':d.dive_type==='Surface Supply'?'tag-surf':'tag-other';
  const tl=d.dive_type==='Bell/Sat'?'Bell/Sat':d.dive_type==='Surface Supply'?'Surface':'Other';
  const jobLoc=[d.job,d.location||d.country].filter(Boolean).join(' · ')||'—';
  const dm=d.depth!=null?`${toDisplay(d.depth)} ${uLbl()}`:'—';
  const da=d.depth!=null?`${toAlt(d.depth)} ${uAlt()}`:'';
  return `
    <div class="dive-row">
      <span class="dive-date">${d.date?fmtDate(d.date):'—'}</span>

      <span class="d-job">${jobLoc}</span>
      <span><div class="d-depth-main">${dm}</div>${da?`<div class="d-depth-alt">${da}</div>`:''}</span>
      <span class="dive-actions">
        <button class="btn-ic edit btn-edit" data-id="${d.id}" title="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button class="btn-ic del btn-del" data-id="${d.id}" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/>
          </svg>
        </button>
      </span>
    </div>`;
}
function toggleMonth(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function fmtDate(iso){const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;}

// DELETE
async function delDive(id){
  if(!confirm('Delete this dive record?'))return;
  const{error}=await sb.from('dives').delete().eq('id',id);
  if(error){showToast(error.message,'err');return;}
  allDives=allDives.filter(d=>d.id!=id);renderAllLogs();
  if(activeTab==='stats')renderStats();showToast('Record deleted');
}

// EDIT
function openEdit(id){
  const d=allDives.find(d=>d.id==id);if(!d)return;
  editingId=id;editType=d.dive_type||'';
  fillForm(d,'e');
  const el=document.getElementById('e-lbl-depth');if(el)el.textContent=`Depth (${uLbl()})`;
  document.getElementById('edit-overlay').classList.add('open');
  document.getElementById('edit-msg').textContent='';
  document.getElementById('edit-msg').className='form-msg';
}
function closeEdit(){document.getElementById('edit-overlay').classList.remove('open');editingId=null;editType='';}
document.getElementById('edit-overlay').addEventListener('click',function(e){if(e.target===this)closeEdit();});
async function updateDive(){
  if(!editingId)return;
  const p=readForm('e');
  if(!p.dive_type){const orig=allDives.find(d=>d.id==editingId);p.dive_type=orig?.dive_type||'';}
  await saveAllDD(p);
  const btn=document.getElementById('btn-update');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  const{data,error}=await sb.from('dives').update(p).eq('id',editingId).select().single();
  btn.disabled=false;btn.textContent='Update';
  if(error){const em=document.getElementById('edit-msg');em.textContent=error.message;em.className='form-msg err';return;}
  allDives=allDives.map(d=>d.id==editingId?data:d);
  renderAllLogs();if(activeTab==='stats')renderStats();
  closeEdit();showToast('Record updated ✓');
}

// STATS
function renderStats(){
  const el=document.getElementById('stats-content');if(!el)return;
  const total=allDives.length;
  const bells=allDives.filter(d=>d.dive_type==='Bell/Sat').length;
  const surfs=allDives.filter(d=>d.dive_type==='Surface Supply').length;
  const depths=allDives.filter(d=>d.depth!=null).map(d=>d.depth);
  const maxD=depths.length?Math.max(...depths):null;
  const avgD=depths.length?depths.reduce((a,b)=>a+b,0)/depths.length:null;
  const clientMap={},vesselMap={};
  allDives.forEach(d=>{
    if(d.client)clientMap[d.client]=(clientMap[d.client]||0)+1;
    if(d.vessel)vesselMap[d.vessel]=(vesselMap[d.vessel]||0)+1;
  });
  const topC=Object.entries(clientMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topV=Object.entries(vesselMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxCount=topC.length?topC[0][1]:1;
  const maxVCount=topV.length?topV[0][1]:1;

  const depthRef=600;

  el.innerHTML=`

          </svg>

        </div>
        <div class="stat-lbl">Bell / Sat</div>
      </div>
      <div class="gauge-card" style="color:var(--surf)">
        <div class="gauge-wrap">
          <svg width="78" height="78" viewBox="0 0 78 78">
            <circle cx="39" cy="39" r="34" fill="none" stroke="var(--bg3)" stroke-width="7"/>
            <circle cx="39" cy="39" r="34" fill="none" stroke="var(--surf)"
              stroke-width="7" stroke-linecap="round"
              stroke-dasharray="${surfDash} ${CIRC}" transform="rotate(-90 39 39)"/>
          </svg>
          <div class="gauge-num" style="color:var(--surf)">${surfs}</div>
        </div>
        <div class="stat-lbl">Surface Supply</div>
      </div>
      <div class="stat-card" style="color:var(--lb)">
        <div class="stat-val" style="font-size:30px">${maxD!=null?toDisplay(Math.round(maxD)):'—'}<span class="stat-unit">${maxD!=null?uLbl():''}</span></div>
        <div class="stat-lbl">Max Depth</div>
      </div>
    </div>

    ${maxD!=null?`
    <div class="depth-bar-card">
      <div class="clabel" style="margin-bottom:12px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="6"/>
          <line x1="12" y1="12" x2="16" y2="8" stroke-width="1.5"/>

        </svg>

        <div class="depth-row-top">

      </div>
      ${avgD!=null?`
      <div class="depth-row">
        <div class="depth-row-top">
          <span class="depth-row-lbl">Average</span>

        </div>
        <div class="depth-track"><div class="depth-fill" style="width:${avgPct}%;background:linear-gradient(90deg,var(--surfD),var(--surf));box-shadow:0 0 6px rgba(61,220,132,.3)"></div></div>

      <div class="lb-rows">
        ${topC.map(([n,c])=>`
          <div class="lb-row">
            <div class="lb-bar" style="width:${Math.round(c/maxCount*100)}%"></div>
            <span class="lb-name">${n}</span><span class="lb-count">${c}</span>
          </div>`).join('')}
      </div>
    </div>`:''}

    ${topV.length?`
    <div class="lb-card">
      <div class="lb-title" style="color:var(--surf)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 17l9-4 9 4"/><path d="M2 21h20"/>
          <path d="M8 17V7l4-4 4 4v10"/>
        </svg>
        Top Vessels
      </div>
      <div class="lb-rows">
        ${topV.map(([n,c])=>`
          <div class="lb-row">
            <div class="lb-bar" style="width:${Math.round(c/maxVCount*100)}%;background:rgba(61,220,132,.05)"></div>
            <span class="lb-name">${n}</span>
            <span class="lb-count" style="color:var(--surf)">${c}</span>
          </div>`).join('')}
      </div>
    </div>`:''}

    ${!total?`<div class="empty">
      <svg viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="24" cy="24" r="9" stroke="currentColor" stroke-width="1.2"/>
        <line x1="24" y1="24" x2="34" y2="14" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="24" cy="24" r="2" fill="currentColor"/>
      </svg>
      <p>Log some dives to see your mission statistics.</p>
    </div>`:''}
  `;
}

// TOAST
let _tt;
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className=type==='err'?'show err':'show';
  clearTimeout(_tt);_tt=setTimeout(()=>t.className='',3000);
}

// PWA INSTALL
let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();_deferredPrompt=e;
  document.getElementById('btn-install').classList.add('visible');
});
window.addEventListener('appinstalled',()=>{
  document.getElementById('btn-install').classList.remove('visible');
  showToast('App installed! Open from your home screen ✓');
});
function doInstall(){
  if(_deferredPrompt){
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(r=>{
      if(r.outcome==='accepted') showToast('Installing…');
      _deferredPrompt=null;
      document.getElementById('btn-install').classList.remove('visible');
    });
  } else {
    showToast('Use browser menu → Add to Home Screen','err');
  }
}

// SERVICE WORKER
if('serviceWorker' in navigator && location.protocol==='https:'){
  const sw=`
const C='slp-v1';
const URLS=['/divinglog/','/divinglog/index.html','/divinglog/app.html','/divinglog/manifest.json'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(URLS).catch(()=>{})));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.open(C).then(cache=>cache.match(e.request).then(hit=>{const net=fetch(e.request).then(r=>{if(r.ok)cache.put(e.request,r.clone());return r;}).catch(()=>hit);return hit||net;})));});`;
  try{const b=new Blob([sw],{type:'text/javascript'});navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});}catch(e){}
}

boot();
</script>
