<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050D18">
<title>Diving Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ink:#050D18;--deep:#081422;--hull:#0C1D30;--plate:#112540;
  --rim:#1A3554;--wire:#234568;--muted:#375E80;--sub:#5A8AAA;
  --text:#C0D8EC;--bright:#E8F4FF;
  --cyan:#00C8F0;--cyan2:#0099BB;
  --bell:#2196F3;--surf:#00C896;--amber:#F4A636;--red:#E74C3C;--purple:#9B6FF5;
  --r:9px;--r2:14px;--tab-h:54px;--hdr-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--ink);color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:13px;overscroll-behavior:none;}
#app{display:flex;flex-direction:column;height:100vh;max-width:780px;margin:0 auto;position:relative;}

/* HEADER */
header{height:var(--hdr-h);flex-shrink:0;
  background:linear-gradient(160deg,var(--deep),var(--hull));
  border-bottom:1px solid var(--rim);padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;position:relative;z-index:10;}
.hdr-left{display:flex;flex-direction:column;gap:1px;}
.hdr-logo{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.22em;text-transform:uppercase;color:var(--cyan);opacity:.8;}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;
  letter-spacing:.02em;color:var(--bright);line-height:1;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.unit-toggle{display:flex;background:var(--plate);border:1px solid var(--rim);
  border-radius:20px;padding:3px;gap:2px;}
.unit-btn{background:none;border:none;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.08em;padding:3px 10px;border-radius:14px;cursor:pointer;transition:all .18s;}
.unit-btn.on{background:var(--cyan);color:var(--ink);box-shadow:0 0 8px rgba(0,200,240,.3);}
.btn-signout{background:none;border:1px solid var(--rim);color:var(--muted);
  font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 10px;
  border-radius:var(--r);cursor:pointer;transition:all .18s;letter-spacing:.04em;}
.btn-signout:hover{border-color:var(--red);color:var(--red);}

/* MAIN */
main{flex:1;overflow-y:auto;overscroll-behavior:contain;
  padding-bottom:calc(var(--tab-h) + 8px);}

/* BOTTOM NAV */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:780px;height:var(--tab-h);
  background:rgba(8,20,34,0.96);backdrop-filter:blur(16px);
  border-top:1px solid var(--rim);display:flex;z-index:20;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;border:none;background:none;color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  border-top:2.5px solid transparent;transition:color .15s,border-color .15s;padding-top:2px;}
.tab-btn .ti{font-size:16px;line-height:1;}
.tab-btn.on-new  {color:var(--amber);border-top-color:var(--amber);}
.tab-btn.on-bell {color:var(--bell); border-top-color:var(--bell);}
.tab-btn.on-surf {color:var(--surf); border-top-color:var(--surf);}
.tab-btn.on-all  {color:var(--cyan); border-top-color:var(--cyan);}
.tab-btn.on-stats{color:var(--purple);border-top-color:var(--purple);}

/* PANELS */
.panel{display:none;padding:14px 14px 0;}
.panel.on{display:block;}

/* SECTION LABEL */
.sec-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:var(--muted);
  margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.sec-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--rim),transparent);}

/* CARD */
.card{background:var(--hull);border:1px solid var(--rim);border-radius:var(--r2);
  padding:16px;margin-bottom:12px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.4;}

/* FIELDS */
.field{margin-bottom:12px;}
.flabel{display:block;font-size:9px;font-weight:500;letter-spacing:.14em;
  text-transform:uppercase;color:var(--sub);margin-bottom:5px;}
.req{color:var(--red);}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;background:var(--plate);border:1.5px solid var(--rim);
  border-radius:var(--r);padding:10px 12px;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:13px;
  outline:none;-webkit-appearance:none;
  transition:border-color .15s,box-shadow .15s;color-scheme:dark;}
input:focus,select:focus,textarea:focus{
  border-color:var(--cyan2);box-shadow:0 0 0 3px rgba(0,200,240,.07);}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);}
select option{background:var(--plate);}
textarea{resize:vertical;min-height:72px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.depth-hint{font-size:10px;color:var(--muted);margin-top:4px;min-height:13px;
  font-style:italic;transition:color .2s;}
.depth-hint.live{color:var(--sub);}

/* DIVE TYPE */
.type-row{display:flex;gap:8px;margin-bottom:12px;}
.type-btn{flex:1;padding:11px 8px;border-radius:var(--r);border:2px solid var(--rim);
  background:var(--plate);color:var(--muted);
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:.05em;cursor:pointer;text-align:center;transition:all .15s;user-select:none;}
.type-btn.bell-on{border-color:var(--bell);background:rgba(33,150,243,.12);color:var(--bell);}
.type-btn.surf-on{border-color:var(--surf);background:rgba(0,200,150,.10);color:var(--surf);}

/* COMBOBOX */
.combo-wrap{position:relative;}
.combo-row{display:flex;}
.combo-inp{flex:1;border-radius:var(--r) 0 0 var(--r) !important;}
.combo-arr{background:var(--plate);border:1.5px solid var(--rim);border-left:none;
  border-radius:0 var(--r) var(--r) 0;color:var(--muted);cursor:pointer;
  padding:0 11px;display:flex;align-items:center;transition:color .15s;flex-shrink:0;}
.combo-arr:hover{color:var(--cyan);}
.combo-arr svg{width:11px;height:11px;pointer-events:none;}
.combo-dd{position:absolute;top:calc(100% + 3px);left:0;right:0;
  background:var(--hull);border:1.5px solid var(--cyan2);border-radius:var(--r);
  z-index:500;max-height:190px;overflow-y:auto;display:none;
  box-shadow:0 12px 40px rgba(0,0,0,.6);}
.combo-dd.open{display:block;}
.combo-opt{padding:10px 13px;cursor:pointer;font-size:13px;color:var(--text);
  border-bottom:1px solid var(--plate);transition:background .12s;}
.combo-opt:last-child{border-bottom:none;}
.combo-opt:hover{background:var(--plate);}
.combo-add{color:var(--cyan);font-size:12px;display:flex;align-items:center;gap:6px;}
.combo-add::before{content:'+';font-size:15px;font-weight:700;}

/* FORM ACTIONS */
.form-actions{display:flex;gap:10px;margin-top:4px;}
.btn-repeat{flex:1;background:var(--plate);border:1px solid var(--rim);color:var(--text);
  padding:11px;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;letter-spacing:.06em;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:all .18s;}
.btn-repeat:hover{border-color:var(--amber);color:var(--amber);}
.btn-save{flex:2;background:var(--cyan);color:var(--ink);border:none;
  padding:11px;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:800;letter-spacing:.08em;cursor:pointer;
  box-shadow:0 0 20px rgba(0,200,240,.25);transition:all .18s;}
.btn-save:hover{background:#33D6F5;}
.btn-save:disabled{opacity:.5;cursor:not-allowed;}
.form-msg{font-size:11px;margin-top:8px;min-height:14px;text-align:center;}
.form-msg.ok{color:var(--surf);}
.form-msg.err{color:var(--red);}

/* LOG */
.month-grp{margin-bottom:8px;}
.month-hdr{display:flex;align-items:center;justify-content:space-between;
  background:var(--hull);border:1px solid var(--rim);border-radius:var(--r);
  padding:11px 14px;cursor:pointer;user-select:none;transition:border-color .18s,background .18s;}
.month-hdr:hover,.month-hdr.open{border-color:var(--cyan2);background:var(--plate);}
.month-hdr.open{border-radius:var(--r) var(--r) 0 0;}
.month-lbl{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  color:var(--bright);letter-spacing:.04em;}
.month-meta{font-size:10px;color:var(--muted);display:flex;gap:12px;align-items:center;}
.month-chev{color:var(--sub);transition:transform .22s;width:14px;height:14px;flex-shrink:0;}
.month-hdr.open .month-chev{transform:rotate(180deg);}
.month-body{display:none;border:1px solid var(--cyan2);border-top:none;
  border-radius:0 0 var(--r) var(--r);overflow:hidden;}
.month-body.open{display:block;}

/* DIVE ROWS */
.dive-hdr-row,.dive-row{
  display:grid;grid-template-columns:82px 1fr 1fr 72px 52px;
  align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--plate);}
.dive-row:last-child{border-bottom:none;}
.dive-hdr-row{background:var(--plate);padding:7px 14px;border-bottom:1px solid var(--rim);}
.dive-row:hover{background:rgba(255,255,255,.03);}
.col-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.dive-date{font-size:11px;color:var(--sub);}
.type-tag{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;padding:3px 7px;border-radius:4px;display:inline-block;}
.tag-bell{background:rgba(33,150,243,.15);color:var(--bell);}
.tag-surf{background:rgba(0,200,150,.13);color:var(--surf);}
.tag-other{background:rgba(90,138,170,.15);color:var(--sub);}
.dive-depth-main{font-size:13px;font-weight:500;color:var(--bright);}
.dive-depth-alt{font-size:10px;color:var(--muted);}
.dive-job{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dive-actions{display:flex;gap:4px;justify-content:flex-end;}
.btn-ic{background:none;border:none;color:var(--muted);cursor:pointer;
  padding:5px;border-radius:5px;display:flex;align-items:center;transition:color .15s;}
.btn-ic.edit:hover{color:var(--cyan);}
.btn-ic.del:hover{color:var(--red);}
.btn-ic svg{width:13px;height:13px;}
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4;}
.empty p{font-size:12px;line-height:1.6;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:var(--hull);border:1px solid var(--rim);border-radius:var(--r2);
  padding:16px;text-align:center;}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;
  color:var(--bright);line-height:1;}
.stat-unit{font-size:10px;color:var(--muted);margin-left:3px;}
.stat-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:5px;}
.stat-card.ac-bell .stat-val{color:var(--bell);}
.stat-card.ac-surf .stat-val{color:var(--surf);}
.stat-card.ac-cyan .stat-val{color:var(--cyan);}
.stat-card.ac-amber .stat-val{color:var(--amber);}
.list-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.list-row{display:flex;align-items:center;justify-content:space-between;
  background:var(--hull);border:1px solid var(--rim);border-radius:var(--r);padding:10px 14px;}
.list-name{font-size:13px;color:var(--text);}
.list-count{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--cyan);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(5,13,24,.88);
  z-index:1000;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{background:var(--hull);border:1px solid var(--rim);border-radius:var(--r2);
  width:min(660px,100%);max-height:90vh;overflow-y:auto;padding:24px;position:relative;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.5;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;
  color:var(--bright);margin-bottom:20px;letter-spacing:.03em;}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;
  color:var(--sub);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:5px;transition:color .15s;}
.modal-close:hover{color:var(--red);}
.modal-actions{display:flex;gap:10px;margin-top:16px;}
.btn-update{flex:1;background:var(--cyan);color:var(--ink);border:none;
  padding:11px;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:800;letter-spacing:.08em;cursor:pointer;transition:all .18s;}
.btn-update:hover{background:#33D6F5;}
.btn-update:disabled{opacity:.5;cursor:not-allowed;}
.btn-cancel{background:var(--plate);border:1px solid var(--rim);color:var(--text);
  padding:11px 20px;border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;}
.btn-cancel:hover{border-color:var(--muted);}

/* TOAST */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--hull);border:1px solid var(--surf);color:var(--surf);
  padding:10px 22px;border-radius:24px;font-size:12px;font-weight:500;
  letter-spacing:.04em;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.err{border-color:var(--red);color:var(--red);}

.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(5,13,24,.4);
  border-top-color:currentColor;border-radius:50%;animation:rot .65s linear infinite;vertical-align:middle;}
@keyframes rot{to{transform:rotate(360deg)}}

@media(min-width:600px){
  .stats-grid{grid-template-columns:repeat(4,1fr);}
  .dive-hdr-row,.dive-row{grid-template-columns:90px 130px 1fr 90px 56px;}
}
@media(max-width:479px){
  .dive-hdr-row,.dive-row{grid-template-columns:70px 1fr 60px 44px;}
  .dive-hdr-row .col-lbl:nth-child(3),.dive-row .dive-job{display:none;}
}
</style>
</head>
<body>
<div id="app">

<header>
  <div class="hdr-left">
    <span class="hdr-logo">Commercial Diving</span>
    <span class="hdr-title">Dive Log</span>
  </div>
  <div class="hdr-right">
    <div class="unit-toggle">
      <button class="unit-btn on" id="btn-m"  onclick="setUnit('metric')">m</button>
      <button class="unit-btn"   id="btn-ft" onclick="setUnit('imperial')">ft</button>
    </div>
    <button class="btn-signout" id="btn-out">Out</button>
  </div>
</header>

<main id="main">

  <!-- NEW DIVE -->
  <div class="panel on" id="panel-new">
    <div class="sec-label" style="color:var(--amber)">New Entry</div>
    <div class="card">
      <div class="flabel">Dive Type <span class="req">*</span></div>
      <div class="type-row">
        <button class="type-btn" id="tb-bell" onclick="pickType('Bell/Sat')">🔔 Bell / Sat</button>
        <button class="type-btn" id="tb-surf" onclick="pickType('Surface Supply')">🌊 Surface Supply</button>
      </div>
      <div class="g2">
        <div class="field">
          <label class="flabel">Date <span class="req">*</span></label>
          <input type="date" id="f-date">
        </div>
        <div class="field">
          <label class="flabel" id="lbl-depth">Depth (m)</label>
          <input type="number" id="f-depth" placeholder="0" min="0" max="3000" oninput="updateHint('f-depth','hint-depth')">
          <div class="depth-hint" id="hint-depth"></div>
        </div>
      </div>
      <div class="field"><label class="flabel">Divers</label><div class="combo-wrap" id="cw-divers"></div></div>
      <div class="g2">
        <div class="field"><label class="flabel">Storage / Table Deco</label><input type="text" id="f-deco" placeholder="e.g. Comex 30"></div>
        <div class="field"><label class="flabel">Excursion / TDT</label><input type="text" id="f-tdt" placeholder="e.g. 45 min"></div>
      </div>
      <div class="g2">
        <div class="field"><label class="flabel">Job</label><div class="combo-wrap" id="cw-job"></div></div>
        <div class="field"><label class="flabel">Client</label><div class="combo-wrap" id="cw-client"></div></div>
      </div>
      <div class="g2">
        <div class="field"><label class="flabel">Vessel</label><div class="combo-wrap" id="cw-vessel"></div></div>
        <div class="field"><label class="flabel">Country</label><div class="combo-wrap" id="cw-country"></div></div>
      </div>
      <div class="field"><label class="flabel">Location</label><input type="text" id="f-location" placeholder="e.g. North Sea, Block 15"></div>
      <div class="field"><label class="flabel">Notes</label><textarea id="f-notes" placeholder="Observations, conditions, incidents…"></textarea></div>
      <div class="form-actions">
        <button class="btn-repeat" onclick="repeatLast()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
          Repeat
        </button>
        <button class="btn-save" id="btn-save" onclick="saveDive()">Save Dive</button>
      </div>
      <div class="form-msg" id="form-msg"></div>
    </div>
  </div>

  <!-- BELL LOG -->
  <div class="panel" id="panel-bell">
    <div class="sec-label" style="color:var(--bell)">Bell / Sat Dives</div>
    <div id="log-bell"></div>
  </div>

  <!-- SURFACE LOG -->
  <div class="panel" id="panel-surf">
    <div class="sec-label" style="color:var(--surf)">Surface Supply Dives</div>
    <div id="log-surf"></div>
  </div>

  <!-- ALL DIVES -->
  <div class="panel" id="panel-all">
    <div class="sec-label" style="color:var(--cyan)">All Dives</div>
    <div id="log-all"></div>
  </div>

  <!-- STATS -->
  <div class="panel" id="panel-stats">
    <div class="sec-label" style="color:var(--purple)">Summary</div>
    <div id="stats-content"></div>
  </div>

</main>

<nav>
  <button class="tab-btn on-new"  id="tn-new"   onclick="goTab('new')">  <span class="ti">➕</span>New</button>
  <button class="tab-btn"         id="tn-bell"  onclick="goTab('bell')"> <span class="ti">🔔</span>Bell</button>
  <button class="tab-btn"         id="tn-surf"  onclick="goTab('surf')"> <span class="ti">🌊</span>Surface</button>
  <button class="tab-btn"         id="tn-all"   onclick="goTab('all')">  <span class="ti">📋</span>All</button>
  <button class="tab-btn"         id="tn-stats" onclick="goTab('stats')"><span class="ti">📊</span>Stats</button>
</nav>

</div><!-- #app -->

<!-- EDIT MODAL -->
<div class="overlay" id="edit-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeEdit()">✕</button>
    <div class="modal-title">Edit Dive</div>
    <div class="flabel">Dive Type</div>
    <div class="type-row">
      <button class="type-btn" id="etb-bell" onclick="pickEditType('Bell/Sat')">🔔 Bell / Sat</button>
      <button class="type-btn" id="etb-surf" onclick="pickEditType('Surface Supply')">🌊 Surface Supply</button>
    </div>
    <div class="g2">
      <div class="field"><label class="flabel">Date</label><input type="date" id="e-date"></div>
      <div class="field">
        <label class="flabel" id="e-lbl-depth">Depth (m)</label>
        <input type="number" id="e-depth" min="0" max="3000" oninput="updateHint('e-depth','e-hint-depth')">
        <div class="depth-hint" id="e-hint-depth"></div>
      </div>
    </div>
    <div class="field"><label class="flabel">Divers</label><div class="combo-wrap" id="ecw-divers"></div></div>
    <div class="g2">
      <div class="field"><label class="flabel">Storage / Table Deco</label><input type="text" id="e-deco"></div>
      <div class="field"><label class="flabel">Excursion / TDT</label><input type="text" id="e-tdt"></div>
    </div>
    <div class="g2">
      <div class="field"><label class="flabel">Job</label><div class="combo-wrap" id="ecw-job"></div></div>
      <div class="field"><label class="flabel">Client</label><div class="combo-wrap" id="ecw-client"></div></div>
    </div>
    <div class="g2">
      <div class="field"><label class="flabel">Vessel</label><div class="combo-wrap" id="ecw-vessel"></div></div>
      <div class="field"><label class="flabel">Country</label><div class="combo-wrap" id="ecw-country"></div></div>
    </div>
    <div class="field"><label class="flabel">Location</label><input type="text" id="e-location"></div>
    <div class="field"><label class="flabel">Notes</label><textarea id="e-notes"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-update" id="btn-update" onclick="updateDive()">Update Dive</button>
    </div>
    <div class="form-msg" id="edit-msg"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPA_URL='https://jqbtjklxbfydmwwztbvn.supabase.co';
const SUPA_KEY='sb_publishable_KT7j111OChA9tnNq2gqkAQ_Vp7TfGkG';
const APP_ROOT='/diving-log-saas/';
const {createClient}=supabase;
const sb=createClient(SUPA_URL,SUPA_KEY);

let user=null,allDives=[],lastDive=null,editingId=null;
let unitSys='metric',diveType='',editType='';
let ddData={divers:[],job:[],client:[],vessel:[],country:[]};
let activeTab='new';

// ── UNITS ──────────────────────────────────────────────
const M2FT=3.28084,FT2M=1/3.28084;
const toDisplay=m=>m==null?null:unitSys==='imperial'?Math.round(m*M2FT):m;
const toMeters=v=>{if(v==null||v==='')return null;const n=parseFloat(v);return isNaN(n)?null:unitSys==='imperial'?Math.round(n*FT2M*10)/10:n;};
const uLbl=()=>unitSys==='imperial'?'ft':'m';
const uAlt=()=>unitSys==='imperial'?'m':'ft';
const toAlt=m=>m==null?null:unitSys==='imperial'?m:Math.round(m*M2FT);

function setUnit(u){
  unitSys=u;
  document.getElementById('btn-m').classList.toggle('on',u==='metric');
  document.getElementById('btn-ft').classList.toggle('on',u==='imperial');
  document.getElementById('lbl-depth').innerHTML=`Depth (${uLbl()})`;
  const el=document.getElementById('e-lbl-depth');if(el)el.textContent=`Depth (${uLbl()})`;
  sb.from('profiles').update({unit_system:u}).eq('id',user.id).then(()=>{});
  renderAllLogs();if(activeTab==='stats')renderStats();
  showToast(u==='metric'?'Metric (m)':'Imperial (ft)');
}
function updateHint(iid,hid){
  const v=parseFloat(document.getElementById(iid)?.value);
  const h=document.getElementById(hid);if(!h)return;
  if(isNaN(v)||!document.getElementById(iid).value){h.textContent='';h.className='depth-hint';return;}
  h.textContent=unitSys==='imperial'?`≈ ${Math.round(v*FT2M*10)/10} m`:`≈ ${Math.round(v*M2FT)} ft`;
  h.className='depth-hint live';
}

// ── AUTH ───────────────────────────────────────────────
async function boot(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href=APP_ROOT+'index.html';return;}
  user=session.user;
  const{data:prof}=await sb.from('profiles').select('unit_system').eq('id',user.id).single();
  if(prof?.unit_system){
    unitSys=prof.unit_system;
    document.getElementById('btn-m').classList.toggle('on',unitSys==='metric');
    document.getElementById('btn-ft').classList.toggle('on',unitSys==='imperial');
    document.getElementById('lbl-depth').innerHTML=`Depth (${uLbl()})`;
  }
  await loadDropdowns();
  buildAllCombos();
  await loadDives();
  setToday();
}
document.getElementById('btn-out').addEventListener('click',async()=>{
  await sb.auth.signOut();window.location.href=APP_ROOT+'index.html';
});

// ── TABS ───────────────────────────────────────────────
const TAB_MAP={
  new: {panel:'panel-new', btn:'tn-new',  cls:'on-new'},
  bell:{panel:'panel-bell',btn:'tn-bell', cls:'on-bell'},
  surf:{panel:'panel-surf',btn:'tn-surf', cls:'on-surf'},
  all: {panel:'panel-all', btn:'tn-all',  cls:'on-all'},
  stats:{panel:'panel-stats',btn:'tn-stats',cls:'on-stats'},
};
function goTab(t){
  activeTab=t;
  Object.keys(TAB_MAP).forEach(k=>{
    const m=TAB_MAP[k];
    document.getElementById(m.panel).classList.toggle('on',k===t);
    document.getElementById(m.btn).className='tab-btn'+(k===t?' '+m.cls:'');
  });
  document.getElementById('main').scrollTop=0;
  if(t==='stats')renderStats();
}

// ── DIVE TYPE ──────────────────────────────────────────
function pickType(t){
  diveType=t;
  document.getElementById('tb-bell').className='type-btn'+(t==='Bell/Sat'?' bell-on':'');
  document.getElementById('tb-surf').className='type-btn'+(t==='Surface Supply'?' surf-on':'');
}
function pickEditType(t){
  editType=t;
  document.getElementById('etb-bell').className='type-btn'+(t==='Bell/Sat'?' bell-on':'');
  document.getElementById('etb-surf').className='type-btn'+(t==='Surface Supply'?' surf-on':'');
}

// ── DROPDOWNS ──────────────────────────────────────────
async function loadDropdowns(){
  const{data}=await sb.from('dropdown_options').select('*').eq('user_id',user.id);
  ddData={divers:[],job:[],client:[],vessel:[],country:[]};
  (data||[]).forEach(r=>{if(ddData[r.field_name]!==undefined)ddData[r.field_name].push(r.value);});
}
async function saveDD(key,val){
  if(!val?.trim()||ddData[key].includes(val.trim()))return;
  ddData[key].push(val.trim());
  await sb.from('dropdown_options').insert({user_id:user.id,field_name:key,value:val.trim()});
}

// ── COMBOBOX ───────────────────────────────────────────
const CW_MAIN=[
  {w:'cw-divers', k:'divers', p:'Search or add diver…',   f:'f-divers'},
  {w:'cw-job',    k:'job',    p:'Search or add job…',      f:'f-job'},
  {w:'cw-client', k:'client', p:'Search or add client…',   f:'f-client'},
  {w:'cw-vessel', k:'vessel', p:'Search or add vessel…',   f:'f-vessel'},
  {w:'cw-country',k:'country',p:'Search or add country…',  f:'f-country'},
];
const CW_EDIT=[
  {w:'ecw-divers', k:'divers', p:'Divers…',  f:'e-divers'},
  {w:'ecw-job',    k:'job',    p:'Job…',      f:'e-job'},
  {w:'ecw-client', k:'client', p:'Client…',   f:'e-client'},
  {w:'ecw-vessel', k:'vessel', p:'Vessel…',   f:'e-vessel'},
  {w:'ecw-country',k:'country',p:'Country…',  f:'e-country'},
];
function buildAllCombos(){
  [...CW_MAIN,...CW_EDIT].forEach(c=>buildCombo(c.w,c.k,c.p,c.f));
}
function buildCombo(wrapId,key,ph,fid){
  const wrap=document.getElementById(wrapId);if(!wrap)return;
  wrap.innerHTML=`
    <div class="combo-row">
      <input type="text" class="combo-inp" id="${fid}" placeholder="${ph}" autocomplete="off">
      <button type="button" class="combo-arr" tabindex="-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
    <div class="combo-dd" id="${fid}-dd"></div>`;
  const inp=document.getElementById(fid);
  const dd=document.getElementById(fid+'-dd');
  const arr=wrap.querySelector('.combo-arr');
  function open(q=''){
    const opts=ddData[key].filter(v=>v.toLowerCase().includes(q.toLowerCase()));
    dd.innerHTML='';
    opts.forEach(v=>{
      const el=document.createElement('div');el.className='combo-opt';el.textContent=v;
      el.addEventListener('mousedown',e=>{e.preventDefault();inp.value=v;dd.classList.remove('open');});
      dd.appendChild(el);
    });
    if(q.trim()&&!ddData[key].map(v=>v.toLowerCase()).includes(q.trim().toLowerCase())){
      const add=document.createElement('div');add.className='combo-opt combo-add';
      add.textContent=`Add "${q.trim()}"`;
      add.addEventListener('mousedown',async e=>{
        e.preventDefault();await saveDD(key,q.trim());inp.value=q.trim();dd.classList.remove('open');
      });
      dd.appendChild(add);
    }
    dd.classList.toggle('open',dd.children.length>0);
  }
  inp.addEventListener('focus',()=>open(inp.value));
  inp.addEventListener('input',()=>open(inp.value));
  inp.addEventListener('blur',()=>setTimeout(()=>dd.classList.remove('open'),200));
  arr.addEventListener('mousedown',e=>{
    e.preventDefault();
    if(dd.classList.contains('open')){dd.classList.remove('open');return;}
    open(inp.value);inp.focus();
  });
}

// ── FORM HELPERS ───────────────────────────────────────
function setToday(){const el=document.getElementById('f-date');if(el&&!el.value)el.value=new Date().toISOString().split('T')[0];}
function gv(id){return document.getElementById(id)?.value||'';}
function sv(id,v){const el=document.getElementById(id);if(el)el.value=v??'';}

function readForm(pfx='f'){
  return{
    date:     gv(`${pfx}-date`),
    dive_type:pfx==='f'?diveType:editType,
    depth:    toMeters(gv(`${pfx}-depth`)),
    depth_unit:unitSys,
    divers:   gv(`${pfx}-divers`),
    deco:     gv(`${pfx}-deco`),
    tdt:      gv(`${pfx}-tdt`),
    job:      gv(`${pfx}-job`),
    client:   gv(`${pfx}-client`),
    vessel:   gv(`${pfx}-vessel`),
    location: gv(`${pfx}-location`),
    country:  gv(`${pfx}-country`),
    notes:    gv(`${pfx}-notes`),
  };
}
function fillForm(d,pfx='f'){
  sv(`${pfx}-date`,d.date);
  sv(`${pfx}-depth`,d.depth!=null?toDisplay(d.depth):'');
  sv(`${pfx}-divers`,d.divers);sv(`${pfx}-deco`,d.deco);sv(`${pfx}-tdt`,d.tdt);
  sv(`${pfx}-job`,d.job);sv(`${pfx}-client`,d.client);sv(`${pfx}-vessel`,d.vessel);
  sv(`${pfx}-location`,d.location);sv(`${pfx}-country`,d.country);sv(`${pfx}-notes`,d.notes);
  updateHint(`${pfx}-depth`,pfx==='f'?'hint-depth':'e-hint-depth');
  if(pfx==='f')pickType(d.dive_type||'');else pickEditType(d.dive_type||'');
}
function clearForm(){
  ['date','depth','divers','deco','tdt','job','client','vessel','location','country','notes']
    .forEach(id=>sv(`f-${id}`,''));
  pickType('');setToday();
  document.getElementById('hint-depth').textContent='';
  document.getElementById('form-msg').textContent='';
  document.getElementById('form-msg').className='form-msg';
}
async function saveAllDD(d){
  await Promise.all(['divers','job','client','vessel','country'].map(k=>saveDD(k,d[k])));
}

// ── SAVE ───────────────────────────────────────────────
async function saveDive(){
  const p=readForm('f');
  if(!p.date){showFMsg('Date is required.','err');return;}
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  await saveAllDD(p);
  const{data,error}=await sb.from('dives').insert({user_id:user.id,...p}).select().single();
  btn.disabled=false;btn.textContent='Save Dive';
  if(error){showFMsg(error.message,'err');return;}
  lastDive={...p};allDives.unshift(data);
  renderAllLogs();clearForm();showToast('Dive saved ✓');
  showFMsg('Saved!','ok');setTimeout(()=>{document.getElementById('form-msg').textContent='';},2500);
}
function showFMsg(txt,cls){const el=document.getElementById('form-msg');el.textContent=txt;el.className=`form-msg ${cls}`;}

// ── REPEAT ─────────────────────────────────────────────
function repeatLast(){
  const src=lastDive||allDives[0];
  if(!src){showToast('No previous dive found','err');return;}
  fillForm({...src,date:new Date().toISOString().split('T')[0]},'f');
  showToast('Last dive loaded — review & save');
}

// ── LOAD ───────────────────────────────────────────────
async function loadDives(){
  const{data,error}=await sb.from('dives').select('*').eq('user_id',user.id).order('date',{ascending:false});
  if(error){console.error(error);return;}
  allDives=data||[];if(allDives.length)lastDive=allDives[0];
  renderAllLogs();
}

// ── RENDER LOGS ────────────────────────────────────────
function renderAllLogs(){
  renderLog('log-bell', allDives.filter(d=>d.dive_type==='Bell/Sat'));
  renderLog('log-surf', allDives.filter(d=>d.dive_type==='Surface Supply'));
  renderLog('log-all',  allDives);
}
function renderLog(cid,dives){
  const el=document.getElementById(cid);if(!el)return;
  if(!dives.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🤿</div><p>No dives here yet.</p></div>`;return;
  }
  const groups={};
  dives.forEach(d=>{const k=d.date?d.date.slice(0,7):'unknown';if(!groups[k])groups[k]=[];groups[k].push(d);});
  const MON=['January','February','March','April','May','June','July','August','September','October','November','December'];
  let html='';let first=true;
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(ym=>{
    const ds=groups[ym];const[yr,mo]=ym.split('-');
    const lbl=`${MON[parseInt(mo)-1]} ${yr}`;
    const maxD=Math.max(...ds.map(d=>d.depth||0));
    const maxStr=maxD?`↓ ${toDisplay(maxD)}${uLbl()} / ${toAlt(maxD)}${uAlt()}`:'';
    const isOpen=first;first=false;
    html+=`
      <div class="month-grp">
        <div class="month-hdr ${isOpen?'open':''}" onclick="toggleMonth(this)">
          <span class="month-lbl">${lbl}</span>
          <span class="month-meta">
            <span>${ds.length} dive${ds.length!==1?'s':''}</span>
            ${maxStr?`<span>${maxStr}</span>`:''}
          </span>
          <svg class="month-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="month-body ${isOpen?'open':''}">
          <div class="dive-hdr-row">
            <span class="col-lbl">Date</span>
            <span class="col-lbl">Type</span>
            <span class="col-lbl">Job / Location</span>
            <span class="col-lbl">Depth</span>
            <span class="col-lbl"></span>
          </div>
          ${ds.map(d=>diveRow(d)).join('')}
        </div>
      </div>`;
  });
  el.innerHTML=html;
  el.querySelectorAll('.btn-edit').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();openEdit(b.dataset.id);}));
  el.querySelectorAll('.btn-del').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();delDive(b.dataset.id);}));
}
function diveRow(d){
  const tc=d.dive_type==='Bell/Sat'?'tag-bell':d.dive_type==='Surface Supply'?'tag-surf':'tag-other';
  const jobLoc=[d.job,d.location||d.country].filter(Boolean).join(' · ')||'—';
  const dm=d.depth!=null?`${toDisplay(d.depth)} ${uLbl()}`:'—';
  const da=d.depth!=null?`${toAlt(d.depth)} ${uAlt()}`:'';
  return `
    <div class="dive-row">
      <span class="dive-date">${d.date?fmtDate(d.date):'—'}</span>
      <span><span class="type-tag ${tc}">${d.dive_type||'—'}</span></span>
      <span class="dive-job">${jobLoc}</span>
      <span><div class="dive-depth-main">${dm}</div>${da?`<div class="dive-depth-alt">${da}</div>`:''}</span>
      <span class="dive-actions">
        <button class="btn-ic edit btn-edit" data-id="${d.id}" title="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-ic del btn-del" data-id="${d.id}" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
        </button>
      </span>
    </div>`;
}
function toggleMonth(hdr){hdr.classList.toggle('open');hdr.nextElementSibling.classList.toggle('open');}
function fmtDate(iso){const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;}

// ── DELETE ─────────────────────────────────────────────
async function delDive(id){
  if(!confirm('Delete this dive?'))return;
  const{error}=await sb.from('dives').delete().eq('id',id);
  if(error){showToast(error.message,'err');return;}
  allDives=allDives.filter(d=>d.id!=id);renderAllLogs();
  if(activeTab==='stats')renderStats();showToast('Dive deleted');
}

// ── EDIT ───────────────────────────────────────────────
function openEdit(id){
  const d=allDives.find(d=>d.id==id);if(!d)return;
  editingId=id;
  fillForm(d,'e');
  document.getElementById('e-lbl-depth').textContent=`Depth (${uLbl()})`;
  document.getElementById('edit-overlay').classList.add('open');
  document.getElementById('edit-msg').textContent='';
  document.getElementById('edit-msg').className='form-msg';
}
function closeEdit(){document.getElementById('edit-overlay').classList.remove('open');editingId=null;editType='';}
document.getElementById('edit-overlay').addEventListener('click',function(e){if(e.target===this)closeEdit();});

async function updateDive(){
  if(!editingId)return;
  const p=readForm('e');
  // if editType not set, preserve original
  if(!p.dive_type){const orig=allDives.find(d=>d.id==editingId);p.dive_type=orig?.dive_type||'';}
  await saveAllDD(p);
  const btn=document.getElementById('btn-update');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  const{data,error}=await sb.from('dives').update(p).eq('id',editingId).select().single();
  btn.disabled=false;btn.textContent='Update Dive';
  if(error){const em=document.getElementById('edit-msg');em.textContent=error.message;em.className='form-msg err';return;}
  allDives=allDives.map(d=>d.id==editingId?data:d);
  renderAllLogs();if(activeTab==='stats')renderStats();
  closeEdit();showToast('Dive updated ✓');
}

// ── STATS ──────────────────────────────────────────────
function renderStats(){
  const el=document.getElementById('stats-content');if(!el)return;
  const total=allDives.length;
  const bells=allDives.filter(d=>d.dive_type==='Bell/Sat').length;
  const surfs=allDives.filter(d=>d.dive_type==='Surface Supply').length;
  const depths=allDives.filter(d=>d.depth!=null).map(d=>d.depth);
  const maxD=depths.length?Math.max(...depths):null;
  const avgD=depths.length?depths.reduce((a,b)=>a+b,0)/depths.length:null;
  const clientMap={},vesselMap={};
  allDives.forEach(d=>{
    if(d.client)clientMap[d.client]=(clientMap[d.client]||0)+1;
    if(d.vessel)vesselMap[d.vessel]=(vesselMap[d.vessel]||0)+1;
  });
  const topC=Object.entries(clientMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topV=Object.entries(vesselMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const fmt=m=>m!=null?`${toDisplay(Math.round(m*10)/10)} ${uLbl()}`:'—';

  el.innerHTML=`
    <div class="stats-grid">
      <div class="stat-card ac-cyan"><div class="stat-val">${total}</div><div class="stat-lbl">Total Dives</div></div>
      <div class="stat-card ac-bell"><div class="stat-val">${bells}</div><div class="stat-lbl">Bell / Sat</div></div>
      <div class="stat-card ac-surf"><div class="stat-val">${surfs}</div><div class="stat-lbl">Surface Supply</div></div>
      <div class="stat-card ac-amber">
        <div class="stat-val">${maxD!=null?toDisplay(maxD):'—'}<span class="stat-unit">${maxD!=null?uLbl():''}</span></div>
        <div class="stat-lbl">Max Depth</div>
      </div>
    </div>
    ${avgD!=null?`<div class="card"><div class="sec-label">Average Depth</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--sub)">${fmt(avgD)}</div>
    </div>`:''}
    ${topC.length?`<div class="sec-label" style="color:var(--purple)">Top Clients</div>
    <div class="list-rows">${topC.map(([n,c])=>`<div class="list-row"><span class="list-name">${n}</span><span class="list-count">${c}</span></div>`).join('')}</div>`:''}
    ${topV.length?`<div class="sec-label" style="color:var(--amber)">Top Vessels</div>
    <div class="list-rows">${topV.map(([n,c])=>`<div class="list-row"><span class="list-name">${n}</span><span class="list-count">${c}</span></div>`).join('')}</div>`:''}
    ${!total?`<div class="empty"><div class="empty-icon">📊</div><p>Log some dives to see stats.</p></div>`:''}`;
}

// ── TOAST ──────────────────────────────────────────────
let _tt;
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className=type==='err'?'show err':'show';
  clearTimeout(_tt);_tt=setTimeout(()=>t.className='',2800);
}

boot();
</script>
</body>
</html>
